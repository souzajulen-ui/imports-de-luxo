        const params = new URLSearchParams(window.location.search);

        function renderProducts() {
    if (filtered.length === 0) {
        container.innerHTML = "<p class='col-span-full text-center py-20 text-gray-400 uppercase tracking-widest'>Nenhum item encontrado.</p>";
        return;
    }
    
    container.innerHTML = ""; // Limpa antes de renderizar

    filtered.forEach(p => {
        // Se o produto tiver ID, ele pode abrir a galeria, senão apenas mostra a imagem
        const clickAction = p.id ? `onclick="openGallery('${p.id}')"` : "";
        const cursorClass = p.id ? "cursor-pointer" : "";

        container.innerHTML += `
            <div class="bg-white border border-gray-100 p-2 md:p-6 shadow-sm hover:shadow-md transition text-center group">
                <div class="relative overflow-hidden mb-4 ${cursorClass}" ${clickAction}>
                    <img src="${p.image}" class="w-full h-40 md:h-64 object-contain group-hover:scale-105 transition duration-500">
                    ${p.id ? '<div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition flex items-center justify-center"><span class="bg-white/90 px-2 py-1 text-[9px] uppercase font-bold tracking-widest shadow-sm">Ver Detalhes</span></div>' : ''}
                </div>
                <h3 class="font-serif text-sm md:text-lg mb-1 h-12 overflow-hidden">${p.name}</h3>
                <p class="text-base md:text-xl font-bold mb-4 text-gray-800">R$ ${p.price.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                <button onclick="addToCart('${p.name}', ${p.price}, '${p.image}')"

                    Adicionar ao carrinho
                </button>
            </div>
        `;
    });
}

        // FUNÇÃO PARA A LUPA FUNCIONAR
        function realizarBusca() {
            const input = document.getElementById("searchInput");
            const query = input.value.trim();
            if (query !== "") {
                window.location.href = `pesquisa.html?q=${encodeURIComponent(query)}`;
            }
        }

        // ENTER NO TECLADO TAMBÉM ACIONA A BUSCA
        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") realizarBusca();
        });

        // CARRINHO (Funções Básicas)
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        function updateCartCount() { document.getElementById("cartCount").innerText = cart.length; }
        function toggleCart() {
            const sidebar = document.getElementById("cartSidebar");
            const isOpen = sidebar.style.right === "0px";
            sidebar.style.right = isOpen ? "-400px" : "0px";
            if (!isOpen) renderCart();
        }

        // ADICIONE ESTA FUNÇÃO:
function addToCart(name, price, image) {
    // 1. Pega o carrinho atual do LocalStorage
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    
    // 2. Adiciona o novo produto ao array
    cart.push({ name, price, image });
    
    // 3. Salva de volta no LocalStorage
    localStorage.setItem("cart", JSON.stringify(cart));
    
    // 4. Atualiza o número do ícone e abre o carrinho para mostrar que funcionou
    updateCartCount();
    toggleCart(); 
}

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            document.getElementById("cartCount").innerText = cart.length;
        }

        function renderCart() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartItems = document.getElementById("cartItems");
    const cartTotal = document.getElementById("cartTotal");
    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((product, index) => {
        total += product.price;
        cartItems.innerHTML += `
            <div class="flex items-center gap-4 mb-4 border-b border-gray-100 pb-4">
                <img src="${product.image}" class="w-16 h-16 object-contain bg-gray-50 rounded">
                <div class="flex-1">
                    <h3 class="text-[10px] font-bold uppercase tracking-tight leading-tight">${product.name}</h3>
                    <p class="text-sm font-semibold text-gray-700">${product.price.toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}</p>
                </div>
                <button onclick="removeItem(${index})" 
                        class="text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-red-600 transition-colors duration-300">
                    Remover
                </button>
            </div>`;
    });
    cartTotal.innerText = total.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }

        function openGallery(galleryId) {
            if (productGalleries[galleryId]) {
                currentGallery = productGalleries[galleryId];
                currentImageIndex = 0;
                
                // Gera thumbnails dinamicamente
                const thumbContainer = document.querySelector(".gallery-thumbs-container");
                thumbContainer.innerHTML = '';
                currentGallery.forEach((image, index) => {
                    const thumb = document.createElement('img');
                    thumb.className = 'gallery-thumb w-20 h-20 object-cover cursor-pointer border-2 border-gray-200 hover:border-cyan-500 transition';
                    thumb.src = image;
                    thumb.onclick = () => {
                        currentImageIndex = index;
                        updateGalleryImage();
                    };
                    thumbContainer.appendChild(thumb);
                });
                
                document.getElementById("modalGallery").classList.remove("hidden");
                document.getElementById("galleryOverlay").classList.remove("hidden");
                updateGalleryImage();
            }
        }

        function closeGallery() {
            document.getElementById("modalGallery").classList.add("hidden");
            document.getElementById("galleryOverlay").classList.add("hidden");
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % currentGallery.length;
            updateGalleryImage();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + currentGallery.length) % currentGallery.length;
            updateGalleryImage();
        }

        function updateGalleryImage() {
            document.getElementById("mainGalleryImage").src = currentGallery[currentImageIndex];
            document.getElementById("imageCounter").textContent = `${currentImageIndex + 1} / ${currentGallery.length}`;
            
            // Atualiza estilos dos thumbnails
            document.querySelectorAll(".gallery-thumb").forEach((thumb, index) => {
                thumb.classList.toggle("border-cyan-500", index === currentImageIndex);
                thumb.classList.toggle("border-gray-200", index !== currentImageIndex);
            });
        }
    </script>

    <!-- MODAL GALERIA -->
<div id="modalGallery" class="fixed inset-0 z-[70] hidden flex items-center justify-center">
    <div class="bg-white w-full max-w-5xl mx-4 rounded-lg shadow-2xl overflow-hidden">
        <!-- Cabeçalho -->
        <div class="bg-cyan-500 text-white px-6 py-4 flex justify-between items-center">
            <span class="text-sm uppercase tracking-widest font-bold" id="imageCounter">1 / 3</span>
            <button onclick="closeGallery()" class="text-2xl hover:text-red-500 transition">✕</button>
        </div>
        
        <!-- Imagem Principal -->
        <div class="relative bg-white flex items-center justify-center min-h-[70vh]">
            <img id="mainGalleryImage" src="" class="max-w-full max-h-[70vh] object-contain">
            
            <!-- Botões de Navegação -->
            <button onclick="prevImage()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white text-black w-12 h-12 rounded-full flex items-center justify-center text-xl transition">
                ❮
            </button>
            <button onclick="nextImage()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white text-black w-12 h-12 rounded-full flex items-center justify-center text-xl transition">
                ❯
            </button>
        </div>
        
        <!-- Thumbnails -->
        <div class="bg-gray-50 px-6 py-4 flex gap-3 overflow-x-auto justify-center gallery-thumbs-container">
        </div>
    </div>
</div>

<div id="galleryOverlay" class="fixed inset-0 bg-black/70 z-[65] hidden"></div>
